<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gizli Şifreleme Aracı</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #0a0a0f;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    position: relative;
    overflow-x: hidden;
  }
  canvas#matrix {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    width: 100%; height: 100%;
    opacity: 0.4;
    pointer-events: none;
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px;
  }
  .header {
    text-align: center;
    margin-bottom: 36px;
  }
  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: rgba(0,255,136,0.06);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 12px;
    padding: 10px 22px;
    margin-bottom: 14px;
  }
  .header-badge span.icon { font-size: 28px; }
  .header-badge span.title {
    font-size: 13px;
    color: #00ff88;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .subtitle {
    font-size: 12px;
    color: #667;
    letter-spacing: 1px;
  }
  .toggle-bar {
    display: flex;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 24px;
  }
  .toggle-btn {
    flex: 1;
    padding: 12px 0;
    background: transparent;
    border: none;
    border-radius: 8px;
    color: #555;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 2px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.25s;
  }
  .toggle-btn.active-encrypt {
    background: rgba(0,255,136,0.12);
    color: #00ff88;
  }
  .toggle-btn.active-decrypt {
    background: rgba(255,100,100,0.12);
    color: #ff6464;
  }
  label.field-label {
    display: block;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
    font-weight: 700;
  }
  label.key-label { color: #00ff88; }
  label.msg-label { color: #888; }
  .result-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    letter-spacing: 2px;
    margin-bottom: 8px;
    text-transform: uppercase;
    font-weight: 700;
  }
  .key-wrapper {
    position: relative;
    margin-bottom: 20px;
  }
  .key-input {
    width: 100%;
    padding: 14px 50px 14px 16px;
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.2);
    border-radius: 10px;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    outline: none;
    letter-spacing: 4px;
  }
  .key-input.visible { letter-spacing: 2px; }
  .eye-btn {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: rgba(0,255,136,0.53);
    cursor: pointer;
    font-size: 18px;
    padding: 4px;
  }
  .msg-area {
    width: 100%;
    padding: 16px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    outline: none;
    resize: vertical;
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .swap-row { text-align: center; margin-bottom: 20px; }
  .swap-btn {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 18px;
    color: #888;
    transition: all 0.2s;
  }
  .swap-btn:hover { background: rgba(255,255,255,0.08); color: #bbb; }
  .copy-btn {
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 6px;
    padding: 4px 12px;
    color: #888;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .copy-btn.copied { background: rgba(0,255,136,0.15); color: #00ff88; }
  .result-box {
    min-height: 100px;
    padding: 16px;
    border-radius: 10px;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    line-height: 1.8;
    letter-spacing: 1.5px;
    word-break: break-all;
    margin-bottom: 24px;
  }
  .result-box.encrypt-mode {
    background: rgba(255,100,100,0.04);
    border: 1px solid rgba(255,100,100,0.15);
    color: #ff8888;
  }
  .result-box.decrypt-mode {
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.15);
    color: #88ffbb;
  }
  .result-box .placeholder { color: #333; font-size: 13px; }
  .info-box {
    background: rgba(255,255,255,0.02);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 16px;
    font-size: 12px;
    color: #555;
    line-height: 1.8;
  }
  .info-box .info-title { color: #777; font-weight: 700; margin-bottom: 6px; letter-spacing: 1px; }
  .info-box .highlight { color: #00ff88; }
  .info-box .note { margin-top: 10px; color: #444; font-size: 11px; }

  /* LOGIN SCREEN */
  #loginScreen {
    position: fixed;
    inset: 0;
    z-index: 100;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  #loginScreen.hidden {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease;
  }
  .login-box {
    text-align: center;
    position: relative;
    z-index: 1;
  }
  .login-lock {
    font-size: 60px;
    margin-bottom: 20px;
    animation: lockPulse 2s ease-in-out infinite;
  }
  @keyframes lockPulse {
    0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(0,255,136,0.2)); }
    50% { transform: scale(1.08); filter: drop-shadow(0 0 25px rgba(0,255,136,0.5)); }
  }
  .login-title {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    color: #00ff88;
    letter-spacing: 6px;
    text-transform: uppercase;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .login-sub {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #444;
    letter-spacing: 2px;
    margin-bottom: 30px;
  }
  .login-input-wrapper {
    position: relative;
    margin-bottom: 16px;
  }
  #loginInput {
    width: 280px;
    padding: 14px 20px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    color: #e0e0e0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    text-align: center;
    letter-spacing: 6px;
    outline: none;
    transition: border-color 0.3s;
  }
  #loginInput:focus {
    border-color: rgba(0,255,136,0.4);
  }
  #loginInput.shake {
    animation: shake 0.5s ease;
    border-color: #ff4444 !important;
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-12px); }
    40% { transform: translateX(10px); }
    60% { transform: translateX(-8px); }
    80% { transform: translateX(6px); }
  }
  .login-btn {
    width: 280px;
    padding: 13px 0;
    background: rgba(0,255,136,0.08);
    border: 1px solid rgba(0,255,136,0.25);
    border-radius: 10px;
    color: #00ff88;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.25s;
  }
  .login-btn:hover {
    background: rgba(0,255,136,0.15);
    border-color: rgba(0,255,136,0.5);
  }
  .login-error {
    margin-top: 14px;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    color: #ff4444;
    letter-spacing: 1px;
    height: 16px;
  }
  .login-attempts {
    margin-top: 6px;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    color: #333;
    letter-spacing: 1px;
  }
  #appContent { display: none; }
  #appContent.visible { display: block; }

  /* CELEBRATION */
  #celebration {
    position: fixed;
    inset: 0;
    z-index: 200;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    pointer-events: none;
  }
  #celebration.active {
    display: flex;
    animation: celebFadeIn 0.3s ease;
  }
  @keyframes celebFadeIn {
    from { opacity: 0; } to { opacity: 1; }
  }
  #fireworksCanvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .celeb-text {
    position: relative;
    z-index: 1;
    font-family: 'Courier New', monospace;
    font-size: 28px;
    font-weight: 700;
    color: #ff8844;
    text-align: center;
    text-shadow: 0 0 30px rgba(255,136,68,0.6), 0 0 60px rgba(255,136,68,0.3);
    letter-spacing: 3px;
    animation: celebPulse 1s ease-in-out infinite;
    padding: 0 20px;
  }
  @keyframes celebPulse {
    0%, 100% { transform: scale(1); text-shadow: 0 0 30px rgba(255,136,68,0.6); }
    50% { transform: scale(1.06); text-shadow: 0 0 50px rgba(255,136,68,0.9), 0 0 80px rgba(255,68,68,0.4); }
  }
  .celeb-heart {
    font-size: 48px;
    margin-top: 16px;
    animation: heartBeat 0.8s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }
  @keyframes heartBeat {
    0%, 100% { transform: scale(1); }
    25% { transform: scale(1.2); }
    40% { transform: scale(1); }
    60% { transform: scale(1.15); }
  }
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<!-- CELEBRATION OVERLAY -->
<div id="celebration">
  <canvas id="fireworksCanvas"></canvas>
  <div class="celeb-text">İyi Ki Doğdun Sevgilim 💕</div>
  <div class="celeb-heart">❤️</div>
</div>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-lock">🔒</div>
    <div class="login-title">Erişim Engelli</div>
    <div class="login-sub">Devam etmek için şifreyi girin</div>
    <div class="login-input-wrapper">
      <input type="password" id="loginInput" placeholder="• • • • •" maxlength="20" />
    </div>
    <button class="login-btn" id="loginBtn">Giriş Yap</button>
    <div class="login-error" id="loginError"></div>
    <div class="login-attempts" id="loginAttempts"></div>
  </div>
</div>

<!-- APP CONTENT -->
<div id="appContent">
<div class="container">
  <!-- Header removed -->

  <!-- Mode Toggle -->
  <div class="toggle-bar">
    <button class="toggle-btn active-encrypt" id="btnEncrypt" onclick="setMode('encrypt')">🔒 Şifrele</button>
    <button class="toggle-btn" id="btnDecrypt" onclick="setMode('decrypt')">🔓 Çöz</button>
  </div>

  <!-- Secret Key -->
  <div>
    <label class="field-label key-label">⚿ Gizli Anahtar</label>
    <div class="key-wrapper">
      <input type="password" id="keyInput" class="key-input" placeholder="Anahtarı girin..." oninput="update()" />
      <button class="eye-btn" onclick="toggleKey()">👁‍🗨</button>
    </div>
  </div>

  <!-- Message -->
  <div>
    <label class="field-label msg-label" id="msgLabel">📝 Mesajınız</label>
    <textarea id="msgArea" class="msg-area" rows="4" placeholder="Şifrelemek istediğiniz mesajı yazın..." oninput="update()"></textarea>
  </div>

  <!-- Swap -->
  <div class="swap-row">
    <button class="swap-btn" onclick="swapMode()" title="Sonucu girişe taşı ve modu değiştir">⇅</button>
  </div>

  <!-- Result -->
  <div>
    <div class="result-label">
      <span id="resultLabel" style="color:#ff6464">🔒 Şifreli Çıktı</span>
      <button class="copy-btn" id="copyBtn" onclick="copyResult()" style="display:none">Kopyala</button>
    </div>
    <div class="result-box encrypt-mode" id="resultBox">
      <span class="placeholder">Anahtar ve mesaj girin...</span>
    </div>
  </div>

  <!-- Info -->
  <div class="info-box" style="text-align:center; font-style:italic; color:#aa8866; line-height:2.2; letter-spacing:0.5px; font-size:13px;">
    Düşünceye dönüşse benim etim kemiğim<br>
    Ben, tüm uzaklıkları aşıp erişeceğim<br>
    Sınırsız ötelerden, senin olduğun yere.
  </div>
</div>
</div>

<script>
const ALPHA = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ";
const ALPHA_L = "abcçdefgğhıijklmnoöprsştuüvyz";
let mode = "encrypt";
let currentResult = "";
let keyVisible = false;

function encrypt(text, key) {
  if (!key) return text;
  let r = "", ki = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const ui = ALPHA.indexOf(c), li = ALPHA_L.indexOf(c);
    if (ui !== -1 || li !== -1) {
      const kc = key[ki % key.length].toUpperCase();
      let ks = ALPHA.indexOf(kc);
      if (ks === -1) ks = ALPHA_L.indexOf(key[ki % key.length]);
      if (ks === -1) ks = 0;
      if (ui !== -1) r += ALPHA[(ui + ks) % ALPHA.length];
      else r += ALPHA_L[(li + ks) % ALPHA_L.length];
      ki++;
    } else r += c;
  }
  return r;
}

function decrypt(text, key) {
  if (!key) return text;
  let r = "", ki = 0;
  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const ui = ALPHA.indexOf(c), li = ALPHA_L.indexOf(c);
    if (ui !== -1 || li !== -1) {
      const kc = key[ki % key.length].toUpperCase();
      let ks = ALPHA.indexOf(kc);
      if (ks === -1) ks = ALPHA_L.indexOf(key[ki % key.length]);
      if (ks === -1) ks = 0;
      if (ui !== -1) r += ALPHA[(ui - ks + ALPHA.length) % ALPHA.length];
      else r += ALPHA_L[(li - ks + ALPHA_L.length) % ALPHA_L.length];
      ki++;
    } else r += c;
  }
  return r;
}

function setMode(m) {
  mode = m;
  const be = document.getElementById("btnEncrypt");
  const bd = document.getElementById("btnDecrypt");
  const rl = document.getElementById("resultLabel");
  const rb = document.getElementById("resultBox");
  const ml = document.getElementById("msgLabel");
  const ma = document.getElementById("msgArea");

  be.className = "toggle-btn" + (m === "encrypt" ? " active-encrypt" : "");
  bd.className = "toggle-btn" + (m === "decrypt" ? " active-decrypt" : "");
  rl.style.color = m === "encrypt" ? "#ff6464" : "#00ff88";
  rl.textContent = m === "encrypt" ? "🔒 Şifreli Çıktı" : "🔓 Çözülmüş Metin";
  rb.className = "result-box " + (m === "encrypt" ? "encrypt-mode" : "decrypt-mode");
  ml.textContent = m === "encrypt" ? "📝 Mesajınız" : "📝 Şifreli Metin";
  ma.placeholder = m === "encrypt" ? "Şifrelemek istediğiniz mesajı yazın..." : "Çözmek istediğiniz şifreli metni yapıştırın...";
  update();
}

function update() {
  const key = document.getElementById("keyInput").value;
  const msg = document.getElementById("msgArea").value;
  const rb = document.getElementById("resultBox");
  const cb = document.getElementById("copyBtn");

  if (!key && !msg) {
    rb.innerHTML = '<span class="placeholder">Anahtar ve mesaj girin...</span>';
    cb.style.display = "none"; return;
  }
  if (!key) {
    rb.innerHTML = '<span class="placeholder">Gizli anahtarı girin...</span>';
    cb.style.display = "none"; return;
  }
  if (!msg) {
    rb.innerHTML = '<span class="placeholder">Mesajınızı yazın...</span>';
    cb.style.display = "none"; return;
  }

  currentResult = mode === "encrypt" ? encrypt(msg, key) : decrypt(msg, key);
  glitchReveal(rb, currentResult);
  cb.style.display = "inline-block";

  // Trigger celebration on decrypt
  if (mode === "decrypt") {
    showCelebration();
  }
}

// FIREWORKS
let fireworksRunning = false;
function showCelebration() {
  const celeb = document.getElementById("celebration");
  const canvas = document.getElementById("fireworksCanvas");
  const ctx = canvas.getContext("2d");
  celeb.classList.add("active");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  const particles = [];
  const colors = ["#ff4444","#ff8844","#ffcc00","#ff66aa","#ff5555","#ffaa33","#ff77cc","#ffffff"];

  function Particle(x, y, color) {
    this.x = x; this.y = y;
    this.color = color;
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 6 + 2;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
    this.alpha = 1;
    this.decay = Math.random() * 0.02 + 0.008;
    this.size = Math.random() * 3 + 1.5;
  }

  function burst(x, y) {
    const color = colors[Math.floor(Math.random() * colors.length)];
    for (let i = 0; i < 60; i++) {
      particles.push(new Particle(x, y, color));
    }
  }

  let frame = 0;
  let burstCount = 0;

  function animate() {
    ctx.fillStyle = "rgba(10,10,15,0.15)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Random bursts
    if (frame % 15 === 0 && burstCount < 20) {
      burst(
        Math.random() * canvas.width * 0.8 + canvas.width * 0.1,
        Math.random() * canvas.height * 0.6 + canvas.height * 0.1
      );
      burstCount++;
    }

    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06; // gravity
      p.alpha -= p.decay;
      if (p.alpha <= 0) { particles.splice(i, 1); continue; }
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    frame++;
    if (frame < 300) {
      requestAnimationFrame(animate);
    } else {
      // Fade out
      celeb.style.transition = "opacity 1s ease";
      celeb.style.opacity = "0";
      setTimeout(() => {
        celeb.classList.remove("active");
        celeb.style.opacity = "";
        celeb.style.transition = "";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
      }, 1000);
    }
  }

  // Reset if already running
  particles.length = 0;
  frame = 0;
  burstCount = 0;
  celeb.style.opacity = "";
  animate();
}

function glitchReveal(el, text) {
  const chars = "ÇŞĞÜÖİ@#$%&*!?<>{}[]";
  let iter = 0;
  const max = 8;
  const iv = setInterval(() => {
    el.textContent = text.split("").map((c, i) => {
      if (iter / max > i / text.length) return c;
      return chars[Math.floor(Math.random() * chars.length)];
    }).join("");
    iter++;
    if (iter > max) { clearInterval(iv); el.textContent = text; }
  }, 40);
}

function swapMode() {
  if (currentResult) document.getElementById("msgArea").value = currentResult;
  setMode(mode === "encrypt" ? "decrypt" : "encrypt");
}

function toggleKey() {
  keyVisible = !keyVisible;
  const ki = document.getElementById("keyInput");
  ki.type = keyVisible ? "text" : "password";
  ki.className = "key-input" + (keyVisible ? " visible" : "");
  document.querySelector(".eye-btn").textContent = keyVisible ? "👁" : "👁‍🗨";
}

function copyResult() {
  navigator.clipboard.writeText(currentResult);
  const cb = document.getElementById("copyBtn");
  cb.textContent = "✓ Kopyalandı";
  cb.className = "copy-btn copied";
  setTimeout(() => { cb.textContent = "Kopyala"; cb.className = "copy-btn"; }, 1500);
}

// Matrix rain
(function() {
  const c = document.getElementById("matrix");
  const ctx = c.getContext("2d");
  function resize() { c.width = window.innerWidth; c.height = window.innerHeight; }
  resize(); window.addEventListener("resize", resize);
  const cols = Math.floor(c.width / 16);
  const drops = Array(cols).fill(1);
  const chars = "ABCÇDEFGĞHIİJKLMNOÖPRSŞTUÜVYZ0123456789";
  setInterval(() => {
    ctx.fillStyle = "rgba(10,10,15,0.06)";
    ctx.fillRect(0, 0, c.width, c.height);
    ctx.fillStyle = "#ff880055";
    ctx.font = "13px monospace";
    for (let i = 0; i < drops.length; i++) {
      ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 16, drops[i] * 16);
      if (drops[i] * 16 > c.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
  }, 60);
})();

// LOGIN SYSTEM
(function() {
  const SECRET = "muslu";
  let attempts = 0;
  const maxAttempts = 5;

  const loginScreen = document.getElementById("loginScreen");
  const loginInput = document.getElementById("loginInput");
  const loginBtn = document.getElementById("loginBtn");
  const loginError = document.getElementById("loginError");
  const loginAttempts = document.getElementById("loginAttempts");
  const appContent = document.getElementById("appContent");

  function tryLogin() {
    const val = loginInput.value.trim().toLowerCase();
    if (!val) {
      loginError.textContent = "Şifre boş olamaz.";
      loginInput.classList.add("shake");
      setTimeout(() => loginInput.classList.remove("shake"), 500);
      return;
    }
    if (val === SECRET) {
      // SUCCESS
      loginScreen.classList.add("hidden");
      appContent.classList.add("visible");
      loginInput.value = "";
    } else {
      // FAIL
      attempts++;
      loginInput.value = "";
      loginInput.classList.add("shake");
      setTimeout(() => loginInput.classList.remove("shake"), 500);

      if (attempts >= maxAttempts) {
        loginError.textContent = "Çok fazla hatalı deneme!";
        loginInput.disabled = true;
        loginBtn.disabled = true;
        loginBtn.style.opacity = "0.3";
        loginBtn.style.cursor = "not-allowed";
        loginAttempts.textContent = "Erişim geçici olarak engellendi.";
        setTimeout(() => {
          attempts = 0;
          loginInput.disabled = false;
          loginBtn.disabled = false;
          loginBtn.style.opacity = "1";
          loginBtn.style.cursor = "pointer";
          loginError.textContent = "";
          loginAttempts.textContent = "";
        }, 30000);
      } else {
        loginError.textContent = "Yanlış şifre!";
        loginAttempts.textContent = "Kalan deneme: " + (maxAttempts - attempts);
      }
    }
  }

  loginBtn.addEventListener("click", tryLogin);
  loginInput.addEventListener("keydown", function(e) {
    if (e.key === "Enter") tryLogin();
  });

  // Auto-focus
  loginInput.focus();
})();
</script>
</body>
</html>
